<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 한국어 이름은 | My Korean Name</title>
  <meta name="description" content="Discover your unique Korean name based on your name and birthday. Free, instant, and rooted in authentic Korean naming traditions.">
  <meta name="google-adsense-account" content="ca-pub-4708598194116747">
  <meta property="og:title" content="My Korean Name — 나의 한국어 이름은">
  <meta property="og:description" content="Find your unique Korean name based on your name and birthday. Each name uses real Korean syllables with Hanja meanings.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="My Korean Name — 나의 한국어 이름은">
  <meta name="twitter:description" content="Find your unique Korean name based on your name and birthday. Each name uses real Korean syllables with Hanja meanings.">
  <link rel="stylesheet" href="css/style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4708598194116747" crossorigin="anonymous"></script>
  <script>
    const t = localStorage.getItem('theme');
    if (t) document.documentElement.dataset.theme = t;
  </script>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
  <div class="container">
    <header>
      <h1 data-i18n="siteTitle">나의 한국어 이름은</h1>
      <p class="subtitle" data-i18n="subtitle">Discover your Korean name</p>
    </header>

    <p class="intro-text" data-i18n="introText">Enter your name and birthday to receive a unique Korean name with its Hanja meaning and seasonal personality.</p>

    <main>
      <form id="nameForm">
        <div class="form-group">
          <label for="nameInput" data-i18n="nameLabel">Your Name</label>
          <input
            type="text"
            id="nameInput"
            placeholder="e.g. Sarah"
            data-i18n-placeholder="namePlaceholder"
            autocomplete="given-name"
            required
          >
        </div>
        <div class="form-group">
          <label data-i18n="birthLabel">Date of Birth</label>
          <div class="date-selects">
            <select id="birthYear" required></select>
            <select id="birthMonth" required></select>
            <select id="birthDay" required></select>
          </div>
        </div>
        <button type="submit" class="btn-main" data-i18n="submitBtn">Find My Korean Name →</button>
      </form>
    </main>

    <footer class="site-footer">
      <nav class="footer-links">
        <a href="about.html">About</a>
        <a href="privacy.html">Privacy Policy</a>
      </nav>
      <p>&copy; 2025 My Korean Name</p>
    </footer>
  </div>

  <script src="js/name-logic.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
